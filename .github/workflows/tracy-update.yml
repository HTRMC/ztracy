name: tracy-update

on:
  workflow_dispatch: # manual "Run workflow" button
  repository_dispatch: # event-driven: POST from an external release watcher
    types: [tracy-release]

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Resolve versions
        id: v
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest=$(gh api repos/wolfpld/tracy/releases/latest --jq .tag_name)
          # Fallback: newest semver tag if the latest tag has no Release object.
          if [ -z "$latest" ] || [ "$latest" = "null" ]; then
            latest=$(git ls-remote --tags --sort=-v:refname https://github.com/wolfpld/tracy \
              | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          fi
          current=$(sed -n 's/.*ref=\(v[0-9.]*\).*/\1/p' build.zig.zon)
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest"   >> "$GITHUB_OUTPUT"
          echo "Tracy: current=$current latest=$latest"

      - name: Bump and gate
        if: steps.v.outputs.latest != steps.v.outputs.current
        run: |
          zig fetch --save=tracy "git+https://github.com/wolfpld/tracy#${{ steps.v.outputs.latest }}"
          zig build test          # bindings + no-op path
          zig build -Dtracy       # client compiles and links against the new tag

      - name: Open PR
        if: steps.v.outputs.latest != steps.v.outputs.current
        uses: peter-evans/create-pull-request@v6
        with:
          branch: tracy-update/${{ steps.v.outputs.latest }}
          commit-message: "build: bump tracy ${{ steps.v.outputs.current }} -> ${{ steps.v.outputs.latest }}"
          title: "build: bump tracy ${{ steps.v.outputs.current }} -> ${{ steps.v.outputs.latest }}"
          body: |
            Automated Tracy update: `${{ steps.v.outputs.current }}` -> `${{ steps.v.outputs.latest }}`.

            Gate passed: `zig build test` and `zig build -Dtracy`.

            Release notes: https://github.com/wolfpld/tracy/releases/tag/${{ steps.v.outputs.latest }}
